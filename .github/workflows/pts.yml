name: 🧪 IPTV Dry Test (50 channel)

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: "URL Playlist M3U"
        required: true
        default: "https://iptv-aggregate.vercel.app/tv_channels.m3u"
      sample_size:
        description: "Jumlah channel untuk test"
        required: true
        default: "50"
      workers:
        description: "Workers concurrent"
        required: true
        default: "10"
      timeout:
        description: "Timeout per channel (detik)"
        required: true
        default: "5"

permissions:
  contents: write

jobs:
  dry-test:
    name: 🧪 Dry Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Clone IPTVChecker
        run: git clone --depth=1 https://github.com/NewsGuyTor/IPTVChecker.git

      - name: Install dependencies
        run: pip install -q -r IPTVChecker/requirements.txt

      - name: Download playlist asli
        run: |
          URL="${{ github.event.inputs.playlist_url }}"
          echo "⬇️  Mengunduh dari $URL ..."
          curl -fsSL "$URL" -o full_playlist.m3u
          TOTAL=$(grep -c '#EXTINF' full_playlist.m3u || echo 0)
          echo "✅ Total channel di playlist: $TOTAL"

      - name: Ambil ${{ github.event.inputs.sample_size }} channel sebagai sample
        run: |
          SAMPLE="${{ github.event.inputs.sample_size }}"
          python3 - <<EOF
          import re

          SAMPLE = int("$SAMPLE")

          with open("full_playlist.m3u", encoding="utf-8", errors="ignore") as f:
              lines = f.readlines()

          out = ["#EXTM3U\n"]
          count = 0
          i = 0

          while i < len(lines) and not lines[i].startswith("#EXTINF"):
              i += 1

          while i < len(lines) and count < SAMPLE:
              line = lines[i]
              if line.startswith("#EXTINF"):
                  extinf = line
                  i += 1
                  while i < len(lines) and (lines[i].startswith("#") or lines[i].strip() == ""):
                      i += 1
                  if i < len(lines) and lines[i].strip():
                      out.append(extinf)
                      out.append(lines[i])
                      count += 1
              i += 1

          with open("IPTVChecker/sample.m3u", "w", encoding="utf-8") as f:
              f.writelines(out)

          print(f"✅ Sample dibuat: {count} channel")

          print("\n── Preview 5 channel pertama ──────────────")
          shown = 0
          for line in out:
              if line.startswith("#EXTINF"):
                  name_match  = re.search(r',(.+)$', line.strip())
                  group_match = re.search(r'group-title="([^"]*)"', line)
                  name  = name_match.group(1)  if name_match  else "?"
                  group = group_match.group(1) if group_match else "?"
                  print(f"  [{group}] {name}")
                  shown += 1
                  if shown >= 5:
                      break
          print("────────────────────────────────────────────")
          EOF

      - name: Jalankan IPTVChecker pada sample
        run: |
          cd IPTVChecker
          python IPTV_checker.py sample.m3u \
            -t "${{ github.event.inputs.timeout }}" \
            -w "${{ github.event.inputs.workers }}" \
            -R 1 \
            -s \
            -skip_screenshots \
            -o result.csv \
            -v

      - name: Pindahkan hasil ke folder output/dry-test
        run: |
          mkdir -p output/dry-test

          for STATUS in working dead geoblocked; do
            FILE=$(find IPTVChecker -name "*_${STATUS}.m3u*" 2>/dev/null | head -1)
            if [ -n "$FILE" ]; then
              cp "$FILE" "output/dry-test/sample_${STATUS}.m3u"
              N=$(grep -c '#EXTINF' "output/dry-test/sample_${STATUS}.m3u" || echo 0)
              echo "  ✅ $STATUS: $N channel"
            fi
          done

          [ -f IPTVChecker/result.csv ] && cp IPTVChecker/result.csv output/dry-test/result.csv
          cp IPTVChecker/sample.m3u output/dry-test/sample_input.m3u

          echo ""
          ls -lh output/dry-test/

      - name: Commit hasil ke repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/dry-test/

          DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
          SAMPLE="${{ github.event.inputs.sample_size }}"

          git diff --cached --quiet \
            && echo "Tidak ada perubahan, skip commit." \
            || git commit -m "🧪 Dry Test — $DATE | $SAMPLE channel" && git push

      - name: Tampilkan ringkasan
        run: |
          echo "## 🧪 Hasil Dry Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Playlist:** ${{ github.event.inputs.playlist_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Sample:** ${{ github.event.inputs.sample_size }} channel" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Channel |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|" >> "$GITHUB_STEP_SUMMARY"

          TOTAL=0
          for STATUS in working dead geoblocked; do
            FILE="output/dry-test/sample_${STATUS}.m3u"
            if [ -f "$FILE" ]; then
              N=$(grep -c '#EXTINF' "$FILE" || echo 0)
              TOTAL=$((TOTAL + N))
              case $STATUS in
                working)    LABEL="✅ Working"    ;;
                dead)       LABEL="❌ Dead"       ;;
                geoblocked) LABEL="🌍 Geoblocked" ;;
              esac
              echo "| $LABEL | $N |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ✅ Hasil tersimpan di \`output/dry-test/\` dalam repo." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dry-test-results
          path: output/dry-test/
          retention-days: 3
