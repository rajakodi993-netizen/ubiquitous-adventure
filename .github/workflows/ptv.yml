name: IPTV Master Pipeline (GitLab Source -> Checker -> S3/Release)

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 📥 Checkout GitHub repo
        uses: actions/checkout@v4

      # --- INI DIA BAGIAN YANG HILANG! ---
      - name: 🧲 Tarik Script Asli dari GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          echo "Menarik aggregator.py, config.env, dll dari GitLab..."
          git clone https://oauth2:${GITLAB_TOKEN}@gitlab.com/aditya-lika-ardiansyah/iptv-aggregate.git gitlab_data
          
          # Pindahkan semua isi folder GitLab ke ruang kerja GitHub Actions
          cp -a gitlab_data/. .
          rm -rf gitlab_data
      # -----------------------------------

      - name: ⚙️ Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip

      - name: 📦 Install Python Dependencies & IA CLI
        run: |
          pip install requests python-dotenv aiohttp 
          pip install internetarchive

      - name: 🚀 Setup IPTV Checker Tool
        run: |
          git clone https://github.com/kristofferR/IPTVChecker-Python.git iptv_checker_tool
          pip install -r iptv_checker_tool/requirements.txt
          rm -rf iptv_checker_tool/.git

      - name: 1️⃣ Run Aggregator (Download 14+ Sources)
        run: python aggregator.py

      - name: 2️⃣ Run Filter (Buang VOD/Movie)
        run: python filter_playlist.py || echo "File filter_playlist.py tidak ditemukan, dilewati."

      - name: 3️⃣ Run IPTV Checker (Verifikasi Channel Hidup)
        run: |
          python iptv_checker_tool/IPTV_checker.py tc_filtered.m3u -split -skip_screenshots -w 20 -t 4 -R 0
          mv *_working.m3u* tv_channels_final.m3u || echo "File working tidak ditemukan"
          
          if [ ! -f tv_channels_final.m3u ]; then
            touch tv_channels_final.m3u
          fi

      - name: 🗄️ Buat File Backup ZIP
        run: |
          zip -r iptv_backup.zip tv_channels*.m3u* tc_filtered.m3u backup_files/ *_dead.m3u8 *_geoblocked.m3u8 || true

      - name: 🌐 Upload ke Internet Archive (S3)
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          mkdir -p ~/.config
          cat <<EOF > ~/.config/ia.ini
          [s3]
          access = $IA_ACCESS_KEY
          secret = $IA_SECRET_KEY
          EOF
          
          BUCKET_NAME="pl-x8a9bf2k4m-2026"
          
          echo "Mengunggah tv_channels_final.m3u ke Internet Archive..."
          ia upload $BUCKET_NAME tv_channels_final.m3u \
            --metadata="title:IPV \
            --metadata="mediatype:data" \
            --metadata="creator:Aya"

      - name: 🏷️ Upload Backup ZIP ke GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="update-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG_NAME" iptv_backup.zip \
            --title "Daily IPTV Update $TAG_NAME" \
            --notes "Update otomatis. Sumber: GitLab. Filtered & Checked."
