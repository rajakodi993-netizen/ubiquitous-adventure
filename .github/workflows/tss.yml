name: DRY RUN - IA CLI & Release Test

on:
  workflow_dispatch:

jobs:
  test-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip

      - name: Install Python Dependencies & IA CLI
        run: |
          pip install requests python-dotenv aiohttp 
          # Install alat resmi Internet Archive
          pip install internetarchive

      - name: Setup IPTV Checker
        run: |
          git clone https://github.com/kristofferR/IPTVChecker-Python.git iptv_checker_tool
          pip install -r iptv_checker_tool/requirements.txt
          rm -rf iptv_checker_tool/.git

      - name: 🧪 BUAT DATA MOCK (TIRUAN)
        run: |
          cat <<EOF > tv_channels.m3u
          #EXTM3U
          #EXTINF:-1 group-title="Test",Channel Hidup
          https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8
          #EXTINF:-1 group-title="Test",Channel Mati
          http://link-ini-pasti-mati-12345.com/stream.m3u8
          EOF
          
          mkdir -p backup_files
          echo "Ini file backup palsu" > backup_files/dummy.txt

      - name: Run IPTV Checker & Filter
        run: |
          python iptv_checker_tool/IPTV_checker.py tv_channels.m3u -split -skip_screenshots -w 2 -t 4 -R 0
          mv *_working.m3u* tv_channels_filtered.m3u || echo "File working tidak ditemukan"
          
          if [ ! -f tv_channels_filtered.m3u ]; then
            touch tv_channels_filtered.m3u
          fi

      - name: 📦 Buat File ZIP
        run: |
          zip -r iptv_backup.zip tv_channels*.m3u* backup_files/ *_dead.m3u8 *_geoblocked.m3u8 || true

      - name: 🚀 Upload ke Internet Archive (Official CLI)
        env:
          # Alat 'ia' akan OTOMATIS mendeteksi dan menggunakan 2 variabel ini
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          BUCKET_NAME="pl-x8a9bf2k4m-2026"
          
          echo "Mengunggah file m3u menggunakan IA CLI..."
          
          # Bersih tanpa argumen kunci. Langsung upload dan pasang metadata.
          ia upload $BUCKET_NAME tv_channels_filtered.m3u \
            --metadata="title:IPTV Filtered Playlist" \
            --metadata="mediatype:data" \
            --metadata="creator:zzz"
            
      - name: 🏷️ Upload Backup ZIP ke GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="test-run-$(date +'%Y%m%d-%H%M')"
          
          echo "Membuat rilis test: $TAG_NAME"
          gh release create "$TAG_NAME" iptv_backup.zip \
            --title "DRY RUN TEST $TAG_NAME" \
            --notes "Ini cuma tes pipeline. Abaikan isinya."
